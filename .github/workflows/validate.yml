name: Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate index.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('index.json', 'utf8')); console.log('index.json is valid JSON');"
